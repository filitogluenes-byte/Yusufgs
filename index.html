<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>İyi ki Doğdun Yusuf!</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Montserrat:wght@900&display=swap" rel="stylesheet">
    
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #050505;
            overflow: hidden;
            font-family: Arial, sans-serif;
        }

        /* 1. AŞAMA: 30 Çizgi Animasyonu */
        #intro-stage {
            position: fixed;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
            background: #000;
        }

        .line {
            position: absolute;
            height: 3px;
            width: 0;
            background: linear-gradient(90deg, #FDB913, #A32638);
            border-radius: 5px;
            animation: lineFlow 3.5s forwards ease-in-out;
        }

        @keyframes lineFlow {
            0% { width: 0; transform: translateX(-100vw); opacity: 1; }
            30% { width: 50%; transform: translateX(0); opacity: 1; }
            60% { width: 100%; transform: scaleY(3) rotate(-5deg); opacity: 0.7; }
            100% { width: 0%; transform: translateY(-200px) scale(0); opacity: 0; }
        }

        #welcome-text {
            position: absolute;
            color: #FDB913;
            font-family: 'Dancing Script', cursive;
            font-size: 5rem;
            opacity: 0;
            transform: scale(0.5);
            animation: welcomePop 1.5s 2s forwards;
        }

        @keyframes welcomePop {
            to { opacity: 1; transform: scale(1.2); }
        }

        /* 2. AŞAMA: Ana İçerik */
        #main-content {
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: radial-gradient(circle, #1a1a1a 0%, #000000 100%);
            animation: fadeIn 2s forwards;
        }

        .gs-logo-svg {
            width: 180px;
            height: auto;
            margin-bottom: 20px;
            filter: drop-shadow(0 0 25px rgba(253, 185, 19, 0.7));
            animation: logoFloat 3s ease-in-out infinite;
        }

        @keyframes logoFloat {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-15px) scale(1.05); }
        }

        .birthday-wish {
            font-family: 'Montserrat', sans-serif;
            font-size: clamp(2rem, 8vw, 4rem);
            text-align: center;
            background: linear-gradient(90deg, #FDB913, #A32638, #FDB913);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: textShine 3s linear infinite;
            margin: 20px 0;
            padding: 0 10px;
        }

        @keyframes textShine {
            to { background-position: 200% center; }
        }

        /* 3. AŞAMA: İmza */
        .signature-box {
            margin-top: 30px;
        }

        .signature {
            font-family: 'Dancing Script', cursive;
            font-size: 2.5rem;
            color: #fff;
            border-right: 3px solid #A32638;
            white-space: nowrap;
            overflow: hidden;
            width: 0;
        }

        .animate-sig {
            animation: draw 3.5s steps(40) forwards, blink 0.7s infinite;
        }

        @keyframes draw {
            from { width: 0; }
            to { width: 100%; }
        }

        @keyframes blink {
            50% { border-color: transparent; }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
    </style>
</head>
<body>

    <div id="intro-stage">
        <div id="welcome-text">Hoş Geldin</div>
    </div>

    <div id="main-content">
        <svg class="gs-logo-svg" viewBox="0 0 357 512" xmlns="http://www.w3.org/2000/svg">
            <path fill="#A32638" d="M178.5 0C101.4 0 38.9 62.5 38.9 139.6c0 47.9 24.1 90.1 60.7 115.1-41.8 24.9-69.8 70.3-69.8 122.2 0 79.4 64.4 143.8 143.8 143.8s143.8-64.4 143.8-143.8c0-51.9-28-97.3-69.8-122.2 36.6-25 60.7-67.2 60.7-115.1C318.1 62.5 255.6 0 178.5 0z"/>
            <path fill="#FDB913" d="M178.5 444.6c-43.1 0-78.2-35.1-78.2-78.2 0-43.1 35.1-78.2 78.2-78.2s78.2 35.1 78.2 78.2c0 43.1-35.1 78.2-78.2 78.2zm0-236.4c-35.1 0-63.6-28.5-63.6-63.6 0-35.1 28.5-63.6 63.6-63.6s63.6 28.5 63.6 63.6c0 35.1-28.5 63.6-63.6 63.6z"/>
            <text x="50%" y="45%" text-anchor="middle" fill="#A32638" font-family="Arial" font-weight="bold" font-size="80">G</text>
            <text x="50%" y="75%" text-anchor="middle" fill="#FDB913" font-family="Arial" font-weight="bold" font-size="80">S</text>
        </svg>
        
        <h1 class="birthday-wish">İYİKİ DOĞDUN YUSUF</h1>
        
        <div class="signature-box">
            <div id="sig" class="signature">Enes Deva</div>
        </div>
    </div>

    <script>
        const stage = document.getElementById('intro-stage');
        
        // 30 Çizgi oluştur
        for (let i = 0; i < 30; i++) {
            const line = document.createElement('div');
            line.className = 'line';
            line.style.top = Math.random() * 100 + 'vh';
            line.style.animationDelay = (Math.random() * 0.8) + 's';
            stage.appendChild(line);
        }

        // Geçiş Zamanlaması
        setTimeout(() => {
            stage.style.transition = 'opacity 1s';
            stage.style.opacity = '0';
            
            setTimeout(() => {
                stage.style.display = 'none';
                const main = document.getElementById('main-content');
                main.style.display = 'flex';
                
                // İmza başlangıcı
                setTimeout(() => {
                    document.getElementById('sig').classList.add('animate-sig');
                }, 1000);
            }, 1000);
        }, 4500);
    </script>
</body>
</html>
