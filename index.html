<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>İyi ki Doğdun Yusuf!</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Montserrat:wght@900&display=swap" rel="stylesheet">
    
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #050505;
            overflow: hidden;
            font-family: 'Montserrat', sans-serif;
        }

        /* 1. AŞAMA: 30 Çizgi Animasyonu */
        #intro-stage {
            position: fixed;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        .line {
            position: absolute;
            height: 2px;
            width: 0;
            background: linear-gradient(90deg, #FDB913, #A32638);
            animation: lineFlow 3s forwards ease-in-out;
        }

        @keyframes lineFlow {
            0% { width: 0; transform: translateX(-100vw); opacity: 1; }
            50% { width: 100%; transform: translateX(0) scaleY(2); }
            100% { width: 0; transform: translateY(-100px) rotate(20deg); opacity: 0; }
        }

        /* 2. AŞAMA: Görseldeki Tasarım */
        #main-content {
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: radial-gradient(circle at center, #111 0%, #000 100%);
            animation: fadeIn 1.5s forwards;
        }

        /* Parlayan GS Logosu */
        .logo-container {
            position: relative;
            width: 250px;
            margin-bottom: 40px;
        }

        .gs-logo-img {
            width: 100%;
            filter: drop-shadow(0 0 30px rgba(253, 185, 19, 0.8));
            animation: pulseGlow 2s ease-in-out infinite alternate;
        }

        @keyframes pulseGlow {
            from { filter: drop-shadow(0 0 20px rgba(253, 185, 19, 0.6)); }
            to { filter: drop-shadow(0 0 45px rgba(253, 185, 19, 0.9)); }
        }

        /* Görseldeki Yazı Stili */
        .birthday-text {
            text-align: center;
            line-height: 1.2;
            margin-bottom: 50px;
        }

        .iyiki-dogdun {
            font-size: 2.8rem;
            color: #A32638;
            letter-spacing: 2px;
            margin: 0;
            background: linear-gradient(to right, #A32638, #FDB913);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .yusuf-name {
            font-size: 4rem;
            color: #FDB913;
            margin: 0;
            letter-spacing: 5px;
        }

        /* Enes Deva İmza Kısmı */
        .signature-section {
            margin-top: 20px;
            border-right: 3px solid #A32638;
            padding-right: 10px;
            white-space: nowrap;
            overflow: hidden;
            width: 0;
        }

        .signature-text {
            font-family: 'Dancing Script', cursive;
            font-size: 3rem;
            color: #fff;
        }

        .animate-sig {
            animation: typing 3s steps(20) forwards, blink 0.7s infinite;
        }

        @keyframes typing {
            from { width: 0; }
            to { width: 250px; }
        }

        @keyframes blink {
            50% { border-color: transparent; }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
    </style>
</head>
<body>

    <div id="intro-stage"></div>

    <div id="main-content">
        <div class="logo-container">
            <img src="https://upload.wikimedia.org/wikipedia/commons/f/f6/Galatasaray_Sports_Club_Logo.svg" alt="GS Logo" class="gs-logo-img">
        </div>
        
        <div class="birthday-text">
            <h2 class="iyiki-dogdun">İYİKİ DOĞDUN</h2>
            <h1 class="yusuf-name">YUSUF</h1>
        </div>
        
        <div id="signature-wrap" class="signature-section">
            <span class="signature-text">Enes Deva</span>
        </div>
    </div>

    <script>
        const intro = document.getElementById('intro-stage');
        
        // 30 Çizgiyi oluştur
        for (let i = 0; i < 30; i++) {
            const l = document.createElement('div');
            l.className = 'line';
            l.style.top = Math.random() * 100 + 'vh';
            l.style.animationDelay = (Math.random() * 0.5) + 's';
            intro.appendChild(l);
        }

        // Ekran geçişi
        setTimeout(() => {
            intro.style.display = 'none';
            const main = document.getElementById('main-content');
            main.style.display = 'flex';
            
            // İmza animasyonu başlasın
            setTimeout(() => {
                document.getElementById('signature-wrap').classList.add('animate-sig');
            }, 1000);
        }, 3500);
    </script>
</body>
</html>
